<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feedback form</title>
</head>
<body>
    <h2>Feedback Form</h2>

  <form>
    <label for="name">Name:</label><br>
    <input type="text" id="name" placeholder="Write your name"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" placeholder="Write your email"><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" rows="5" cols="30" placeholder="Write your message here"></textarea><br><br>

    <label>Rate us out of 5:</label><br>
    <input type="radio" name="rating" value="1"> 1<br>
    <input type="radio" name="rating" value="2"> 2<br>
    <input type="radio" name="rating" value="3"> 3<br>
    <input type="radio" name="rating" value="4"> 4<br>
    <input type="radio" name="rating" value="5"> 5<br><br>

    <button type="submit">Send your message!</button>
  </form>
</body>
</html>
